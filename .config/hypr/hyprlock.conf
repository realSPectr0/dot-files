# TIME (Top center, pushed down slightly)
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.8)
    font_size = 120
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, -100
    halign = center
    valign = top
}

# DATE (Below Time)
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 25
    font_family = JetBrains Mono Nerd Font
    position = 0, -280
    halign = center
    valign = top
}

# USER AVATAR (Centered, pushed up)
image {
    monitor =
    path = /home/arch/.config/hypr/mclaren.png
    size = 150
    rounding = -1
    border_size = 4
    border_color = rgb(221, 221, 221)
    position = 0, 100
    halign = center
    valign = center
}

# INPUT FIELD (Centered, pushed down below Avatar)
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font
    placeholder_text = <span foreground="##ffffff99">Hi, $USER</span>
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}

# BACKGROUNDDD
background {
    monitor =
    path = ~/Downloads/mountain.jpg   # update this to your actual path
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 disables blurring
    blur_size = 3
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Example: Ensure hyprlock is triggered before the lid closes
bindl=,switch:on:Lid Switch, exec, hyprlock

